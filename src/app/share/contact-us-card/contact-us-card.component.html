
<div class="contact-section">
  <div class="contact-header">
    <h2>Contact Us</h2>
  </div>

  <div class="contact-cards-container">
    <div class="contact-card">
      <div class="icon-circle">
        <img src="asset/Pngs/phone.png" alt="Phone Icon">
      </div>
      <div class="card-text">
        <h3>Phone Number</h3>
        <p>+4915781081595</p>
      </div>
    </div>

    <div class="contact-card">
      <div class="icon-circle">
        <img src="asset/Pngs/email.png" alt="Email Icon">
      </div>
      <div class="card-text">
        <h3>Email Address</h3>
        <p>AH&amp;HAexample.com</p>
      </div>
    </div>

    <div class="contact-card">
      <div class="icon-circle">
        <img src="asset/Pngs/address-icon.svg" alt="Location Icon">
      </div>
      <div class="card-text">
        <h3>Our Location</h3>
        <p>Gießen, Germany</p>
      </div>
    </div>
  </div>

  <div class="ContactUs_form">
    <form>
      <div class="input_grid">
        <input type="text" placeholder="Your Name*" required>
        <input type="email" placeholder="Email Address*" required>
        <input type="tel" placeholder="Phone Number*" required>
        <input type="text" placeholder="Subject*" required>
      </div>
      <textarea placeholder="Your Message*" rows="8" required></textarea>
      <button type="submit">SEND MESSAGE</button>
    </form>
  </div>
</div>
